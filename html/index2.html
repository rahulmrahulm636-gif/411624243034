<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> doramenon </title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        /* Navbar - Mobile First */
        nav {
            display: flex;
            flex-direction: column;
            background: #f0f0f0;
            padding: 10px;
        }

        nav a {
            text-decoration: none;
            padding: 10px;
            color: black;
        }

        /* Desktop Navbar */
        @media (min-width:768px) {
            nav {
                flex-direction: row;
                gap: 30px;
            }
        }

        h1 {
            margin: 20px 0;
        }

        /* Image */
        img {
            width: 300px;
            max-width: 100%;
            border-radius: 50px;
            /* Even Roll Number */
            display: block;
            margin-bottom: 20px;
        }

        /* Video */
        video {
            width: 50vw;
            padding: 10px;
            background-color: blue;
            /* Change according to roll number */
            margin-bottom: 20px;
        }

        /* Table */
        table {
            border-collapse: collapse;
            margin: 20px 0;
            width: 100%;
        }

        th,
        td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #ddd;
        }

        /* Button */
        button {
            border: none;
            padding: 12px 25px;
            background-color: blue;
            /* Same as video */
            color: white;
            cursor: pointer;
            margin: 20px;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }

        /* Grid - Desktop First */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .box {
            background: #ddd;
            padding: 20px;
            text-align: center;
            font-weight: bold;
        }

        /* Mobile Layout */
        @media (max-width:767px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
